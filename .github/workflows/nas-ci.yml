name: NAS CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-project:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Show Project Files
        run: ls -la

      - name: Validate HTML file
        run: test -f index.html

      - name: Validate CSS file
        run: test -f style.css

      - name: Validate Docker Compose file
        run: test -f docker-compose.yml

      - name: Build Report
        run: echo "NAS CI pipeline completed successfully" > build-report.txt

      - name: Upload Build Report
        uses: actions/upload-artifact@v4
        with:
          name: build-report
          path: build-report.txt